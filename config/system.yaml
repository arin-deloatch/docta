# QA Generation Configuration
# For docta QA generation pipeline

# LLM Configuration
llm:
  provider: google
  model: gemini-2.5-flash    # Fast and cost-effective for QA generation
  temperature: 0.0              # Lower = more focused, higher = more creative
  # max_tokens: 2048            # Optional: limit response length

# Embedding Configuration
embedding:
  provider: google
  model: gemini-embedding-2-preview    # Latest Google embedding model

# Generation Settings
generation:
  testset_size: 100          # Number of QA pairs to generate
  num_documents: null        # Limit documents to process (null = all, or set to positive integer)

  # Query Distribution - must sum to 1.0
  query_distribution:
    specific: 1.0       # SingleHopSpecificQuerySynthesizer (simple factual, single context)
    abstract: 0         # MultiHopAbstractQuerySynthesizer (reasoning, multiple contexts)
    comparative: 0      # MultiHopSpecificQuerySynthesizer (comparisons, multiple contexts)

# Filtering Configuration
# Controls which documentation changes/sections are used for QA generation
filtering:
  # Text length filters (in characters)
  min_text_length: 100           # Skip snippets/sections shorter than this
  max_text_length: 10000        # Skip snippets/sections longer than this

  # Similarity filters (0-100, for modified documents only)
  min_similarity: 0.0           # Include changes with similarity >= this
  max_similarity: 95.0          # Skip near-identical changes above this

  # Change types to include (for modified documents)
  change_types:
    - text_change               # Text content changes (recommended)
    # - structure_change        # Structural changes (sections added/removed)
    # - metadata_change         # Metadata changes (titles, attributes)
    # - document_added          # Added automatically for new documents
